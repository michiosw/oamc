name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Type-check
        run: uv run mypy src

      - name: Lint
        run: uv run ruff check src tests

      - name: Build package
        run: uv build

      - name: Extract release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          tag = os.environ["TAG_NAME"].removeprefix("v")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          lines = changelog.splitlines()
          start = None
          for index, line in enumerate(lines):
              if line.startswith(f"## [{tag}]"):
                  start = index
                  break
          if start is None:
              raise SystemExit(f"Could not find changelog entry for {tag}")
          end = len(lines)
          for index in range(start + 1, len(lines)):
              if lines[index].startswith("## ["):
                  end = index
                  break
          notes = "\n".join(lines[start:end]).strip() + "\n"
          Path("release-notes.md").write_text(notes, encoding="utf-8")
          PY

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" dist/* --title "${{ github.ref_name }}" --notes-file release-notes.md --verify-tag
